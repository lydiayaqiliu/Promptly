<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Enhancer Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>✦ Prompt Enhancer — Settings</header>

    <section>
      <label for="api-key-input">Anthropic API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" />
      <button id="save-key-btn">Save key</button>
      <button id="remove-key-btn" hidden>Remove key</button>
      <span id="key-saved-msg" hidden>Saved ✓</span>
      <span id="key-removed-msg" hidden>Removed ✓</span>
      <span id="key-error-msg" hidden></span>
      <p class="hint">Get your key at console.anthropic.com</p>
    </section>

    <section class="info">
      <p>Evaluation and enhancement behavior is controlled by:</p>
      <code>evaluation-criteria.md</code><br />
      <code>enhancement-criteria.md</code>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
